server:
  port: 8081

spring:
  application:
    name: bot
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:virtual_assistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

telegram:
  bot:
    username: chnu_virtual_assistant_bot
    token: ${TELEGRAM_BOT_TOKEN}

cache:
  item:
    expiration: 1m

api:
  weather:
    base-url: https://api.openweathermap.org
    key: ${OPENWEATHER_API_KEY}
  currency:
    base-url: https://api.exchangerate-api.com

reminder:
  scheduler:
    fixedRate: PT1M
  default:
    hour: 9
    minute: 0

event:
  scheduler:
    fixedRate: PT1M
  default:
    hour: 9
    minute: 0
    duration: 60

