version: '3.8'
services:
  db:
    image: postgres:16.2
    container_name: virtual_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: virtual_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d virtual_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  db_data:

